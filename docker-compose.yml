services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: buscacreci_postgres
    restart: unless-stopped
    working_dir: /application
    volumes:
      - './:/application'
      - 'pg-data:/var/lib/postgresql/data'
      - './docker/postgres/init.sql:/docker-entrypoint-initdb.d/docker_postgres_init.sql'
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - 8043:5432
    networks:
      - buscacreci_network

  redis:
    image: 'redis:7-alpine'
    container_name: buscacreci_redis
    restart: unless-stopped
    ports:
      - 6379:6379
    networks:
      - buscacreci_network

  api:
    image: 'nginx:alpine'
    container_name: buscacreci_nginx_api
    working_dir: /application
    depends_on:
      - postgres
    volumes:
      - './:/application'
      - './docker/nginx/nginx_api.conf:/etc/nginx/conf.d/default.conf'
      - './src:/application/src:rw'
    ports:
      - '8053:80'
    networks:
      - buscacreci_network

  laucher-queue:
    build: ./docker/php-fpm
    command: php src/Infraestrutura/Adaptadores/Mensageria/laucher.php
    volumes:
      - './:/application'
    env_file:
      - .env
    depends_on:
      - rabbitmq-master
    deploy:
      replicas: 1
    networks:
      - buscacreci_network

  worker-email:
    build: ./docker/php-fpm
    command: php src/Infraestrutura/Workers/Email/index.php
    volumes:
      - './:/application'
    env_file:
      - .env
    depends_on:
      - laucher-queue
      - rabbitmq-master
    deploy:
      replicas: 3
    networks:
      - buscacreci_network

  worker-consulta-creci:
    build: ./docker/php-fpm
    command: php src/Infraestrutura/Workers/ConsultaCreci/index.php
    volumes:
      - './:/application'
    env_file:
      - .env
    depends_on:
      - laucher-queue
      - rabbitmq-master
    deploy:
      replicas: 3
    networks:
      - buscacreci_network

  php-fpm:
    build: ./docker/php-fpm
    container_name: buscacreci_php
    working_dir: /application
    depends_on:
      - postgres
      - redis
    volumes:
      - './:/application'
      - './docker/php-fpm/php-ini-overrides.ini:/etc/php/8.4/fpm/conf.d/99-overrides.ini'
    networks:
      - buscacreci_network
    env_file:
      - .env

  rabbitmq-master:
    image: rabbitmq:3-management-alpine
    container_name: buscacreci_rabbitmq
    hostname: rabbitmq-master
    restart: unless-stopped
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=${EVENT_BUS_USER}
      - RABBITMQ_DEFAULT_PASS=${EVENT_BUS_PASSWORD}
    volumes:
      - 'rabbitmq-data:/var/lib/rabbitmq'
    networks:
      - buscacreci_network

networks:
  buscacreci_network:

volumes:
  pg-data:
  rabbitmq-data:
