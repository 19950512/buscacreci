# Rate limiting zones
# 10 requests/second per IP with burst of 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Limit connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Map allowed origins for CORS
map $http_origin $cors_origin {
    default "";
    "https://buscacreci.com.br"    "https://buscacreci.com.br";
    "https://www.buscacreci.com.br" "https://www.buscacreci.com.br";
    "http://localhost:8052"        "http://localhost:8052";
    "http://localhost:3000"        "http://localhost:3000";
}

server {
    listen 80 default;

    client_max_body_size 108M;

    access_log /var/log/nginx/application.access.log;

    root /application/src/Infraestrutura/APIs/BuscaCorretor/Public;
    index index.php;

    # Security headers
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 15;
    limit_req_status 429;
    limit_conn_status 429;

    # try to serve file directly, fallback to index.php
    location / {
        # Handle OPTIONS preflight directly in nginx
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        try_files $uri /index.php$is_args$args;
    }

    if (!-e $request_filename) {
        rewrite ^.*$ /index.php last;
    }

    location ~ \.php$ {
        # CORS headers for actual requests
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # Security headers (need to re-add in location block)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "error_log=/var/log/nginx/application_php_errors.log";
        
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # Timeouts
        fastcgi_read_timeout 300s;
        proxy_read_timeout 300s;
    
        include fastcgi_params;
    }

    # Custom error page for rate limiting
    error_page 429 = @rate_limited;
    location @rate_limited {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Content-Type' 'application/json' always;
        return 429 '{"error": "Too many requests. Please try again later."}';
    }
}
